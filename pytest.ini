[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:datetime\.datetime\.utcnow\(\) is deprecated and scheduled for removal.*:DeprecationWarning:jose\.jwt
markers =
    unit: Unit tests (no DB or API)
    integration: Integration tests (API + DB)
